<!DOCTYPE html>
<html>
<head>
  <title>Supply Chain Risk Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1>🚚 Risk Predictor</h1>
    <p class="subtitle">Predict supply chain disruptions instantly</p>

    <div class="form">
      <input type="number" id="distance" placeholder="📍 Distance (km)">
      <input type="number" id="delay" placeholder="⏱ Delay (hours)">
      
      <select id="weather">
        <option value="">🌦 Select Weather</option>
        <option value="0">☀️ Good Weather</option>
        <option value="1">🌧 Bad Weather</option>
      </select>

      <button onclick="predict()">Predict Risk</button>
    </div>

    <div id="result" class="result"></div>
  </div>

</body>

<script src="script.js"></script>
</html>
